<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroFlow AI | Engineering Sandbox</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-header">
        <h1>AeroFlow <span>Fluid Dynamics</span></h1>
        <div class="badge"><i class="fa-solid fa-microchip"></i> C++ WASM Core Active</div>
    </div>

    <div class="app-container">
        <!-- Sidebar -->
        <div class="glass-panel sidebar">
            <div class="control-section">
                <h3>Wind Tunnel Tools</h3>
                <p class="subtitle">Draw obstacles to test aerodynamics.</p>
                
                <div class="btn-group">
                    <button id="btn-draw" class="glass-btn active"><i class="fa-solid fa-pen"></i> Draw Obstacle</button>
                    <button id="btn-erase" class="glass-btn"><i class="fa-solid fa-eraser"></i> Eraser</button>
                    <button id="btn-clear" class="glass-btn danger"><i class="fa-solid fa-trash"></i> Clear All</button>
                </div>
                
                <div class="slider-group">
                    <label>Brush Size: <span id="brush-size-val">10</span>px</label>
                    <input type="range" id="brush-size" min="2" max="30" value="10">
                </div>
            </div>

            <div class="control-section">
                <h3>Simulation Telemetry</h3>
                <div class="telemetry-box">
                    <div class="telemetry-row">
                        <span>Grid Resolution:</span>
                        <span class="value">200x200 (40,000 cells)</span>
                    </div>
                    <div class="telemetry-row">
                        <span>Physics FPS:</span>
                        <span class="value" id="fps-counter">60</span>
                    </div>
                    <div class="telemetry-row">
                        <span>Solver Iterations:</span>
                        <span class="value">16</span>
                    </div>
                </div>
            </div>
            
            <div class="footer-info">
                Solving the Navier-Stokes equations via Jos Stam's Stable Fluids algorithm.
            </div>
        </div>

        <!-- Main Canvas -->
        <div class="glass-panel canvas-container">
            <canvas id="fluid-canvas" width="600" height="600"></canvas>
            <div class="canvas-overlay-text">High-Velocity Inlet <i class="fa-solid fa-wind"></i></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
