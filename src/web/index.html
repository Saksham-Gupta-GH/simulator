<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroFlow Engine</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="md-app-bar">
        <h1><i class="fa-solid fa-wind" style="color:#1a73e8;"></i> AeroFlow <span>Engine</span></h1>
        <div class="badge">CFD WASM Solver</div>
    </div>

    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="control-section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                    <h3>Global Properties</h3>
                    <button id="btn-play-pause" class="md-btn" style="margin: 0; padding: 4px 12px; background: #1a73e8; color: white;"><i class="fa-solid fa-play"></i> Start Sim</button>
                </div>
                
                <div class="slider-group">
                    <label>Grid Resolution</label>
                    <select id="grid-res" style="width: 100%; padding: 6px; border: 1px solid #dadce0; border-radius: 4px;">
                        <option value="100">100x100 (Fastest)</option>
                        <option value="200" selected>200x200 (Balanced)</option>
                        <option value="300">300x300 (Detailed)</option>
                        <option value="400">400x400 (Ultra HQ)</option>
                    </select>
                </div>

                <div class="slider-group" style="margin-top: 15px;">
                    <label>Smoke Density <span><span id="prop-dens-val">100</span></span></label>
                    <input type="range" id="prop-dens" min="0" max="255" value="100">
                </div>
                <div class="slider-group">
                    <label>Viscosity <span><span id="prop-visc-val">0.000</span></span></label>
                    <input type="range" id="prop-visc" min="0" max="0.01" step="0.0001" value="0">
                </div>
            </div>

            <div class="control-section">
                <h3>Wind Tunnel Tools</h3>
                
                <div class="btn-group">
                    <button id="btn-draw" class="md-btn active"><i class="fa-solid fa-pen"></i> Freehand</button>
                    <button id="btn-erase" class="md-btn"><i class="fa-solid fa-eraser"></i> Erase</button>
                    <button id="btn-shape-rect" class="md-btn"><i class="fa-regular fa-square"></i> Rectangle</button>
                    <button id="btn-shape-tri" class="md-btn"><i class="fa-solid fa-caret-up"></i> Triangle</button>
                    <button id="btn-shape-circle" class="md-btn"><i class="fa-regular fa-circle"></i> Circle</button>
                </div>
                
                <div class="slider-group">
                    <label>Brush/Shape Size <span><span id="brush-size-val">10</span>px</span></label>
                    <input type="range" id="brush-size" min="2" max="60" value="10">
                </div>
                <div class="slider-group">
                    <label>Shape Rotation <span><span id="shape-rot-val">0</span>°</span></label>
                    <input type="range" id="shape-rot" min="0" max="360" value="0">
                </div>
                
                <div class="slider-group">
                    <label>Shape Color</label>
                    <input type="color" id="shape-color" value="#5f6368" style="width: 100%; height: 32px; padding: 0; cursor: pointer;">
                </div>
                
                <button id="btn-clear" class="md-btn danger" style="width: 100%; justify-content: center; margin-top: 8px;"><i class="fa-solid fa-trash"></i> Clear Obstacles</button>
            </div>

            <div class="control-section">
                <h3>Fluid Emitters</h3>
                <div class="btn-group">
                    <button id="btn-src-point" class="md-btn"><i class="fa-solid fa-location-dot"></i> Point Source</button>
                    <button id="btn-src-line" class="md-btn"><i class="fa-solid fa-grip-lines-vertical"></i> Line Source</button>
                </div>
                <p style="font-size: 0.8rem; color:#5f6368; margin-bottom: 16px;">Select a tool above and click on the canvas to place a new emitter.</p>
                
                <!-- Dynamic Emitter Cards will go here -->
                <div id="emitters-list"></div>
                
            </div>

            <div class="control-section" style="border-bottom: none;">
                <h3>Telemetry</h3>
                <div class="telemetry-box">
                    <div class="telemetry-row">
                        <span>Grid Res</span>
                        <span class="value" id="res-val">200x200</span>
                    </div>
                    <div class="telemetry-row">
                        <span>FPS</span>
                        <span class="value" id="fps-counter">60</span>
                    </div>
                    <div class="telemetry-row">
                        <span>Active Sources</span>
                        <span class="value" id="src-count">0</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Canvas -->
        <div class="canvas-container">
            <canvas id="fluid-canvas" width="600" height="600"></canvas>
        </div>
    </div>

    <script src="wasm/fluid_sim.js"></script>
    <script src="app.js"></script>
</body>
</html>
